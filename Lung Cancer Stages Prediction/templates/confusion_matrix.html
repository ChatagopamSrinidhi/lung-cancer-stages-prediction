{% extends 'dashboard_base.html' %}
{% block content %}
  <h2><i class="fas fa-border-all"></i> Confusion Matrix</h2>
  
  {% if cm_b64 %}
    <div class="card">
      <div class="card-header"><i class="fas fa-th"></i> Test Set Classification Results</div>
      <div class="card-body text-center">
        <img src="data:image/png;base64,{{ cm_b64 }}" class="img-fluid" style="max-width: 600px; border-radius: 8px;">
        <p class="mt-3 text-muted">Rows = True Label | Columns = Predicted Label</p>
      </div>
    </div>
  {% else %}
    <div class="alert alert-warning">
      <i class="fas fa-info-circle"></i> Unable to generate confusion matrix. Ensure model is trained and test set is available.
    </div>
  {% endif %}
{% endblock %}
